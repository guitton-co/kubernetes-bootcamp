apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-command
  labels:
    app: broken-command
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-command
  template:
    metadata:
      labels:
        app: broken-command
    spec:
      containers:
        - name: app
          image: busybox:1.37
          command:
            - sh
            - -c
            - 'echo "starting up"; sleep 2; echo "fatal: BOOM"; exit 1'
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
